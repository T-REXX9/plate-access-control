{% extends "base.html" %}
{% block title %}Sign in · Gatekeeper{% endblock %}
{% block body_class %}auth-page{% endblock %}
{% block content %}
<section class="auth-card">
  <div class="auth-badge">GK</div>
  <p class="eyebrow">Local access control</p>
  <h1>Gatekeeper sign in</h1>
  <p class="muted">Administrators and security guards use their assigned account.</p>
  <form method="post" class="stack-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>Username<input name="username" autocomplete="username" required autofocus></label>
    <label>Password<input type="password" name="password" autocomplete="current-password" required></label>
    <button class="primary-button full" type="submit">Sign in</button>
  </form>
</section>
{% endblock %}
